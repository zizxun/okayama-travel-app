<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="岡山行程" />
    <title>岡山行程助手</title>
    <meta
      name="description"
      content="2026/8/13-8/19 岡山、宮島、姬路、倉敷、廣島旅行助手"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/okayama-icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/okayama-icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">2026/8/13-8/19</p>
          <h1>岡山行程助手</h1>
        </div>
        <div class="top-actions">
          <button class="text-button" id="editModeToggle" type="button">編輯</button>
          <button class="icon-button" id="printBtn" type="button" aria-label="列印行程" title="列印行程">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M6 9V3h12v6" />
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
              <path d="M6 14h12v7H6z" />
            </svg>
          </button>
        </div>
      </header>

      <main>
        <section class="trip-summary" aria-label="旅行總覽">
          <div class="summary-card">
            <p class="eyebrow">Trip</p>
            <h2>機票時間</h2>
            <div class="flight-list" aria-label="機票時間">
              <div class="flight-card">
                <span>去程</span>
                <strong>8/13 四 11:30-15:05</strong>
                <small>抵達岡山桃太郎機場</small>
              </div>
              <div class="flight-card">
                <span>回程</span>
                <strong>8/19 三 15:55-17:40</strong>
                <small>岡山桃太郎機場出發</small>
              </div>
            </div>
            <label class="memo-field">
              <span>備忘錄</span>
              <textarea id="tripMemo" rows="5" placeholder="可以記航班訂位代號、飯店備註、想買的東西、同行提醒..."></textarea>
            </label>
          </div>

          <figure class="pass-map-card">
            <div class="map-heading">
              <div>
                <p class="eyebrow">JR-WEST Pass</p>
                <h2>關西＆廣島地區鐵路周遊券範圍</h2>
              </div>
              <a class="text-button map-open" href="./assets/kansai_hiroshima_map.jpg" target="_blank" rel="noreferrer">開圖</a>
            </div>
            <img src="./assets/kansai_hiroshima_map.jpg" alt="關西＆廣島地區鐵路周遊券可使用區域地圖" />
            <figcaption>重點看岡山、廣島、宮島、姬路與關西方向；實際可搭列車仍以 JR-WEST 官方規則為準。</figcaption>
          </figure>
        </section>

        <nav class="tabs" aria-label="主要功能">
          <button class="tab active" type="button" data-tab="itinerary">行程</button>
          <button class="tab" type="button" data-tab="points">點位</button>
          <button class="tab" type="button" data-tab="budget">預算</button>
          <button class="tab" type="button" data-tab="expenses">記帳</button>
          <button class="tab" type="button" data-tab="checklist">清單</button>
        </nav>

        <section class="view active" id="itinerary" aria-label="每日行程">
          <div class="day-nav" id="dayNav"></div>
          <article class="day-detail" id="dayDetail"></article>
        </section>

        <section class="view" id="points" aria-label="地圖點位">
          <div class="toolbar">
            <label>
              日期
              <select id="pointDayFilter"></select>
            </label>
            <label>
              類型
              <select id="pointCategoryFilter"></select>
            </label>
          </div>
          <div class="point-list" id="pointList"></div>
        </section>

        <section class="view" id="budget" aria-label="交通與預算">
          <div class="budget-summary" id="budgetSummary"></div>
          <div class="budget-list" id="budgetList"></div>
        </section>

        <section class="view" id="expenses" aria-label="旅行記帳">
          <section class="exchange-panel" aria-labelledby="exchangeRateTitle">
            <div class="exchange-heading">
              <div>
                <p class="eyebrow" id="exchangeRateTitle">JPY → TWD</p>
                <div class="exchange-rate-line">
                  <strong id="exchangeRateDisplay">取得匯率中</strong>
                  <span class="exchange-source" id="exchangeRateStatus" role="status"></span>
                </div>
              </div>
              <button class="icon-button" id="refreshExchangeRate" type="button" aria-label="更新匯率" title="更新匯率">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5" />
                  <path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5" />
                </svg>
              </button>
            </div>

            <div class="exchange-settings">
              <label>
                匯率來源
                <select id="exchangeRateMode">
                  <option value="auto">每日參考匯率</option>
                  <option value="manual">自訂匯率</option>
                </select>
              </label>
              <label id="manualExchangeRateField" hidden>
                ¥1 等於多少台幣
                <input id="manualExchangeRate" type="number" inputmode="decimal" min="0.0001" step="0.0001" placeholder="0.2000" />
              </label>
            </div>

            <details class="exchange-calculator">
              <summary>快速試算</summary>
              <div class="calculator-row">
                <label>
                  日圓 JPY
                  <input id="exchangeCalculatorYen" type="number" inputmode="numeric" min="0" step="1" value="1000" />
                </label>
                <span class="calculator-equals" aria-hidden="true">=</span>
                <output id="exchangeCalculatorTwd" for="exchangeCalculatorYen">等待匯率</output>
              </div>
            </details>
          </section>

          <section class="public-fund-panel" aria-labelledby="publicFundTitle">
            <div class="public-fund-heading">
              <div>
                <p class="eyebrow">共同錢包</p>
                <h2 id="publicFundTitle">公帳</h2>
              </div>
              <p class="public-fund-status" id="publicFundStatus" role="status"></p>
            </div>

            <div class="public-fund-summary" id="publicFundSummary"></div>

            <div class="public-fund-tools">
              <details class="public-fund-topup">
                <summary>補入公帳</summary>
                <form class="public-fund-form" id="publicFundForm">
                  <label>
                    日期
                    <select id="publicFundDate" required></select>
                  </label>
                  <label>
                    補入人
                    <select id="publicFundMember" required></select>
                  </label>
                  <label>
                    金額 JPY
                    <input id="publicFundAmount" type="number" inputmode="numeric" min="1" step="1" placeholder="10000" required />
                  </label>
                  <label class="public-fund-note-field">
                    備註
                    <input id="publicFundNote" type="text" maxlength="80" placeholder="現金、Suica 或旅費預存" />
                  </label>
                  <button class="text-button primary-action" type="submit">補入</button>
                </form>
              </details>

              <details class="public-fund-ledger-panel">
                <summary id="publicFundLedgerSummary">公帳明細</summary>
                <div class="public-fund-ledger" id="publicFundLedger"></div>
              </details>
            </div>
          </section>

          <form class="expense-form" id="expenseForm">
            <label>
              日期
              <select id="expenseDate" required></select>
            </label>
            <label>
              分類
              <select id="expenseCategory" required></select>
            </label>
            <label>
              金額 JPY
              <input id="expenseAmount" type="number" inputmode="numeric" min="1" step="1" placeholder="1200" required />
            </label>
            <label>
              付款人
              <select id="expensePayer" required></select>
            </label>
            <label>
              分帳
              <select id="expenseSplit" required></select>
            </label>
            <label class="expense-owner-field" id="expenseOwnerField" hidden>
              算誰的
              <select id="expenseOwner" disabled></select>
            </label>
            <label>
              項目
              <input id="expenseName" type="text" maxlength="40" placeholder="午餐、車票、伴手禮" required />
            </label>
            <label class="expense-note-field">
              備註
              <input id="expenseNote" type="text" maxlength="80" placeholder="店名或付款方式" />
            </label>
            <button class="text-button primary-action" type="submit">新增</button>
          </form>

          <div class="expense-summary" id="expenseSummary"></div>

          <div class="toolbar expense-filters">
            <button class="text-button" id="exportExpensesCsv" type="button">匯出 CSV</button>
            <label>
              日期
              <select id="expenseDayFilter"></select>
            </label>
            <label>
              分類
              <select id="expenseCategoryFilter"></select>
            </label>
            <label>
              付款人
              <select id="expensePayerFilter"></select>
            </label>
          </div>

          <div class="expense-list" id="expenseList"></div>
        </section>

        <section class="view" id="checklist" aria-label="行前清單">
          <div class="toolbar checklist-tools">
            <button class="text-button" id="exportBackup" type="button">匯出備份</button>
            <button class="text-button" id="importBackup" type="button">匯入備份</button>
            <input class="visually-hidden" id="backupFileInput" type="file" accept="application/json,.json" />
            <button class="text-button" id="resetChecklist" type="button">重設清單</button>
            <button class="text-button danger-action" id="clearLocalData" type="button">清除本機資料</button>
          </div>
          <div class="checklist" id="checklistItems"></div>
          <section class="phrase-panel">
            <h2>日文小句</h2>
            <div id="phraseList"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
